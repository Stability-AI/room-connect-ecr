version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - uploads:/tmp/room-connect-uploads
      - renders:/tmp/room-connect-renders
    environment:
      - UPLOAD_DIR=/tmp/room-connect-uploads
      - RENDER_DIR=/tmp/room-connect-renders
      - FLASK_ENV=development
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 --timeout 600 --worker-class gthread --threads 4 --reload app:app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # Production-ready single container setup
  production:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - uploads:/tmp/room-connect-uploads
    environment:
      - UPLOAD_DIR=/tmp/room-connect-uploads
    profiles:
      - prod

volumes:
  uploads:
  renders:
